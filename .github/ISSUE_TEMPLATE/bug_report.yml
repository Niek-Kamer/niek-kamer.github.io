name: Bug report
description: Something on the site is broken or misbehaving.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more specific you can be, the faster it gets fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect?
      placeholder: |
        Steps to reproduce:
        1. Go to ...
        2. Click ...
        3. ...

        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://...

  - type: input
    id: env
    attributes:
      label: Browser / OS / device
      placeholder: e.g. Firefox 144 on Linux, iPhone 17 Safari, etc.

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Console errors, screenshots, network traces — drop them here.
