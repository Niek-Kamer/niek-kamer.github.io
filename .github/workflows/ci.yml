name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint • typecheck • build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Astro's CLI requires Node >= 22.12 even when invoked via Bun's script
      # runner — without this step the runner's default Node 20 fails the build.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tokens-gen

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: tokens-gen clippy
        run: cargo clippy --manifest-path tokens-gen/Cargo.toml --all-targets -- -D warnings

      - name: tokens-gen unit tests
        run: cargo test --manifest-path tokens-gen/Cargo.toml --release --quiet

      - name: Codegen drift check
        # Regenerates src/generated/tokens.ts and fails if the committed file
        # is stale. Ensures the Rust source-of-truth and the generated TS
        # never diverge in main.
        run: bun run codegen:check

      - name: Biome + ESLint
        run: bun run check:ci

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
